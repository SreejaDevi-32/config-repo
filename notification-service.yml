# ===============================
# SMPP CONFIGURATION
# ===============================
#smpp:
#  enabled: false

# ===============================
# ASYNC CONFIGURATION
# ===============================
notification:
  async:
    core-pool-size: 5
    max-pool-size: 20
    queue-capacity: 100
    thread-name-prefix: notification-exec-

# ===============================
# RESILIENCE4J
# ===============================
resilience4j:
  retry:
    instances:
      notificationRetry:
        max-attempts: 3
        wait-duration: 2s

  circuitbreaker:
    instances:
      notificationCircuitBreaker:
        sliding-window-size: 10
        minimum-number-of-calls: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        
        
        
#Eureka Server
eureka:
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${server.port}
    
  client:
    fetch-registry: true
    register-with-eureka: true
    service-url:
      defaultZone: http://localhost:8761/eureka/

# ===============================
# LOGGING
# ===============================
logging:
  level:
    root: INFO
    org.springframework.mail: DEBUG
    org.jsmpp: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
