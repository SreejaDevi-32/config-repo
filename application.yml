app:
  pagination:
    default-size: 10
    max-size: 50
    default-sort:
      direction: ASC
      field: createdAt

aes:
  encryption:
    key: k4G4pZB+9m5j4yD2zW8QyWcJ1xA4m0F5z7KXbLrR9kA=


eureka:
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${server.port}

  client:
    fetch-registry: true
    register-with-eureka: true
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}

management:
  endpoints:
    web:
      exposure:
        include: "*"

  endpoint:
    health:
      probes:
        enabled: true

  health:
    readiness-state:
      enabled: true
    liveness-state:
      enabled: true
